services:
  postgres:
    container_name: notify_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-notifydb}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: notify_redis
    image: redis:7-alpine
    ports:
      - "6666:6379"

  api:
    build: .
    command: ./api-bin
    ports:
      - "3333:3333"
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ./worker-bin
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: